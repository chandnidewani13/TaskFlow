{% extends 'base/employee_base.html' %}

{% block content %}

<h1 class="mb-4">

Meetings

</h1>

<div class="card p-5">

<table class="table table-hover">

<thead>

<tr>

<th>

Meeting

</th>

<th>

Date

</th>

<th>

Time

</th>

<th>

Description

</th>

</tr>

</thead>

<tbody>

{% for meeting in meetings %}

<tr>

<td>

{{ meeting.title }}

</td>

<td>

{{ meeting.date }}

</td>

<td>

{{ meeting.time }}

</td>

<td>

{{ meeting.description }}

</td>

</tr>

{% empty %}

<tr>

<td colspan="4" class="text-center">

No Meetings Scheduled

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
