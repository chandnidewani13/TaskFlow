{% load static %}

<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Employee Dashboard

</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="{% static 'css/style.css' %}">

<link
rel="stylesheet"
href="{% static 'css/employee.css' %}">

<link
rel="stylesheet"
href="{% static 'css/responsive.css' %}">

</head>

<body>

<div class="sidebar">

<h2 class="logo">

TaskFlow

</h2>

<ul>

<li>

<a href="/employee-dashboard/">

📊 Dashboard

</a>

</li>

<li>

<a href="/my-tasks/">

✅ My Tasks

</a>

</li>

<li>

<a href="/employee-kanban/">

🧩 Kanban

</a>

</li>

<li>

<a href="/employee-meetings/">

📅 Meetings

</a>

</li>

<li>

<a href="/employee-chat/">

💬 Chat

</a>

</li>

<li>

<a href="/uploads/">

📁 Uploads

</a>

</li>

<li>

<a href="/profile/">

👤 Profile

</a>

</li>

<li>

<a href="#"
onclick="logoutUser()">

🚪 Logout

</a>

</li>

</ul>
</div>

<div class="main-content">

<div class="topbar">

<h3>

Employee Panel

</h3>

</div>

<div class="content-area">

{% block content %}
{% endblock %}

</div>

</div>

<script
type="module"
src="{% static 'js/app.js' %}">
</script>

</body>

</html>
