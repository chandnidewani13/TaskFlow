{% load static %}

<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Leader Dashboard

</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="{% static 'css/style.css' %}">

<link
rel="stylesheet"
href="{% static 'css/leader.css' %}">

<link
rel="stylesheet"
href="{% static 'css/responsive.css' %}">

</head>

<body>

<div class="sidebar">

<h2 class="logo">

TaskFlow

</h2>

<ul>

<li>

<a href="/leader/dashboard/">
📊 Dashboard
</a>

</li>

<li>

<a href="/task-management/">

✅ Tasks

</a>

</li>

<li>

<a href="/kanban/">

🧩 Kanban

</a>

</li>

<li>

<a href="/team-members/">

👨‍💻 Team Members

</a>

</li>

<li>

<a href="/team-chat/">

💬 Team Chat

</a>

</li>

<li>

<a href="/calendar/">

📅 Calendar

</a>

</li>

<li>

<a href="{% url 'leader_analytics' %}">
📈 Analytics
</a>

</li>

<li>

<a href="#"
onclick="logoutUser()">

🚪 Logout

</a>

</li>

</ul>
</div>

<div class="main-content">

<div class="topbar">

<h3>

Team Leader Panel

</h3>

</div>

<div class="content-area">

{% block content %}
{% endblock %}

</div>

</div>

<script
type="module"
src="{% static 'js/app.js' %}">
</script>

</body>

</html>
