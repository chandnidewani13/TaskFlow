{% load static %}

<!DOCTYPE html>

<html>

<head>

<title>

TaskFlow Register

</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="{% static 'css/style.css' %}">

</head>

<body class="auth-body">

<div class="auth-container">

<div class="auth-card">

<h1 class="text-center mb-4">

Create Account

</h1>

<div class="mb-3">

<input
type="text"
id="registerName"
class="form-control"
placeholder="Full Name">

</div>

<div class="mb-3">

<input
type="email"
id="registerEmail"
class="form-control"
placeholder="Email Address">

</div>

<div class="mb-3">

<input
type="password"
id="registerPassword"
class="form-control"
placeholder="Password">

</div>

<div class="mb-4">

<select
id="userRole"
class="form-select">

<option value="admin">

Admin

</option>

<option value="business">

Business

</option>

<option value="team_leader">

Team Leader

</option>

<option value="employee">

Employee

</option>

</select>

</div>

<button
onclick="registerUser()"
class="btn btn-success w-100">

Register

</button>

<div class="text-center mt-4">

<a href="/">

Already have account?

</a>

</div>

</div>

</div>

<script
type="module"
src="{% static 'js/app.js' %}">
</script>

</body>

</html>
