{% load static %}

<!DOCTYPE html>

<html>

<head>

<title>

TaskFlow Login

</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="{% static 'css/style.css' %}">

</head>

<body class="auth-body">

<div class="auth-container">

<div class="auth-card">

<h1 class="text-center mb-4">

TaskFlow

</h1>

<p class="text-center mb-4">

AI-Ready Team Productivity Platform

</p>

<div class="mb-3">

<input
type="email"
id="loginEmail"
class="form-control"
placeholder="Email Address">

</div>

<div class="mb-4">

<input
type="password"
id="loginPassword"
class="form-control"
placeholder="Password">

</div>

<button
onclick="loginUser()"
class="btn btn-primary w-100">

Login

</button>

<div class="text-center mt-4">

<a href="/register/">

Create Account

</a>

|

<a href="/forgot-password/">

Forgot Password

</a>

</div>

</div>

</div>

<script
type="module"
src="{% static 'js/app.js' %}">
</script>

</body>

</html>
