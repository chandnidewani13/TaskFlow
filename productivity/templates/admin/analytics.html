{% extends 'base/admin_base.html' %}

{% block content %}

<h1 class="mb-4">

Admin Analytics

</h1>

<div class="row">

<div class="col-md-4">

<div class="card dashboard-card">

<h5>

Total Users

</h5>

<h2>

{{ total_users }}

</h2>

</div>

</div>

<div class="col-md-4">

<div class="card dashboard-card">

<h5>

Projects

</h5>

<h2>

{{ total_projects }}

</h2>

</div>

</div>

<div class="col-md-4">

<div class="card dashboard-card">

<h5>

Total Tasks

</h5>

<h2>

{{ total_tasks }}

</h2>

</div>

</div>

</div>

<div class="row mt-4">

<div class="col-md-6">

<div class="card dashboard-card">

<h5>

Completed Tasks

</h5>

<h2>

{{ completed_tasks }}

</h2>

</div>

</div>

<div class="col-md-6">

<div class="card dashboard-card">

<h5>

Pending Tasks

</h5>

<h2>

{{ pending_tasks }}

</h2>
</div>

<div class="card p-4 mt-4">

<h3>

System Overview

</h3>

<canvas id="analyticsChart"></canvas>


</div>

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const ctx = document.getElementById(
'analyticsChart'
);

new Chart(ctx, {

type: 'bar',

data: {

labels: [

'Projects',

'Tasks',

'Users',

'Completed',

'Pending'

],

datasets: [{

label: 'System Statistics',

data: [

{{ total_projects }},

{{ total_tasks }},

{{ total_users }},

{{ completed_tasks }},

{{ pending_tasks }}

]

}]

}

});

</script>
{% endblock %}
