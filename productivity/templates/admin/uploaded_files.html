{% extends 'base/admin_base.html' %}

{% block content %}

<h1 class="mb-4">

Uploaded Files

</h1>

<div class="card p-4">

<table class="table table-hover">

<thead>

<tr>

<th>

File Name

</th>

<th>

Uploaded At

</th>

<th>

Action

</th>

</tr>

</thead>

<tbody>

{% for file in uploads %}

<tr>

<td>

{{ file.title }}

</td>

<td>

{{ file.uploaded_at }}

</td>

<td>

<a
href="{{ file.file.url }}"
target="_blank"
class="btn btn-primary btn-sm">

View

</a>

</td>

</tr>

{% empty %}

<tr>

<td colspan="3" class="text-center">

No Files Uploaded

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
