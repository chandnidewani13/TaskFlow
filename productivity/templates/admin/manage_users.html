{% extends 'base/admin_base.html' %}

{% block content %}

<h1 class="mb-4">

Manage Users

</h1>

<div class="card p-4">

<table class="table table-hover">

<thead>

<tr>

<th>Name</th>

<th>Email</th>

<th>Role</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody>

{% for user in users %}

<tr>

<td>

{{ user.name }}

</td>

<td>

{{ user.email }}

</td>

<td>

{{ user.role }}

</td>

<td>

<span class="badge bg-success">

Active

</span>

</td>

<td>

<button class="btn btn-danger btn-sm">

Block

</button>

</td>

</tr>

{% empty %}

<tr>

<td colspan="5" class="text-center">

No Users Found

</td>

</tr>

{% endfor %}

</tbody>
</table>

</div>

{% endblock %}
